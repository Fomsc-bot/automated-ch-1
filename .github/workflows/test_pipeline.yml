name: Test Video Rendering Pipeline (Dry Run)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (FFmpeg & fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-montserrat

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required folders
        run: |
          mkdir -p output logs assets/music assets/fonts assets/brand assets/templates

      - name: Copy System font
        run: |
          if [ -f "/usr/share/fonts/truetype/montserrat/Montserrat-Bold.ttf" ]; then
            cp /usr/share/fonts/truetype/montserrat/Montserrat-Bold.ttf assets/fonts/
          fi

      - name: Execute Test Run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          TTS_PROVIDER: "google"
          UPLOAD_VIDEO: "false"
          DRY_RUN: "true"
        run: |
          python run_pipeline.py

      - name: Upload Test Output Video and Thumbnail
        uses: actions/upload-artifact@v4
        with:
          name: test-assets
          path: |
            output/
          retention-days: 3
